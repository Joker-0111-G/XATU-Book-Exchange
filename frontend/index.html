      if (!oldPwd || !newPwd) { toast('请填写完整', 'error'); return; }
      try {
        await api('PUT', '/user/password', { old_password: oldPwd, new_password: newPwd });
        toast('密码已修改', 'success');
        document.getElementById('oldPwd').value = '';
        document.getElementById('newPwd').value = '';
      } catch (e) { toast(e.message, 'error'); }
    }

    // =====================================================
    // Admin
    // =====================================================
    async function loadAdmin() {
      if (!getToken()) { document.getElementById('statsContainer').innerHTML = ''; document.getElementById('adminBooksTable').innerHTML = '<div class="empty"><p>请先登录</p></div>'; return; }
      loadStats();
      loadAdminBooks();
      loadAdminCategories();
    }

    async function loadStats() {
      try {
        const res = await api('GET', '/admin/statistics');
        const s = res.data || {};
        document.getElementById('statsContainer').innerHTML = `
      <div class="stat-card"><div class="num">${s.user_count || 0}</div><div class="label">用户总数</div></div>
      <div class="stat-card"><div class="num">${s.book_count || 0}</div><div class="label">图书总数</div></div>
      <div class="stat-card"><div class="num">${s.order_count || 0}</div><div class="label">订单总数</div></div>
      <div class="stat-card"><div class="num">${s.completed_orders || 0}</div><div class="label">已完成交易</div></div>
    `;
      } catch (e) { }
    }

    async function loadAdminBooks() {
      const container = document.getElementById('adminBooksTable');
      try {
        const res = await api('GET', '/admin/books?page=1&page_size=50');
        const books = res.data || [];
        if (!books.length) { container.innerHTML = '<div class="empty"><p>暂无图书</p></div>'; return; }
        container.innerHTML = `<div class="table-wrap"><table>
      <thead><tr><th>ID</th><th>书名</th><th>卖家</th><th>价格</th><th>状态</th><th>操作</th></tr></thead>
      <tbody>${books.map(b => `<tr>
        <td>${b.id}</td>
        <td><a onclick="showBookDetail(${b.id})" style="cursor:pointer">${b.title}</a></td>
        <td>${b.user?.nickname || '未知'}</td>
        <td>¥${Number(b.selling_price).toFixed(2)}</td>
        <td><span class="${b.status === 1 ? 'badge-success' : b.status === 2 ? 'badge-danger' : 'badge-gray'}">${b.status === 1 ? '在售' : b.status === 2 ? '已售' : '下架'}</span></td>
        <td>${b.status === 0 ? `<button class="btn btn-success btn-sm" onclick="adminUpdateBookStatus(${b.id},1)">上架</button>` : `<button class="btn btn-danger btn-sm" onclick="adminUpdateBookStatus(${b.id},0)">下架</button>`}</td>
      </tr>`).join('')}</tbody>
    </table></div>`;
      } catch (e) { container.innerHTML = '<div class="empty"><p>加载失败</p></div>'; }
    }

    async function adminUpdateBookStatus(id, status) {
      try { await api('PUT', '/admin/books/' + id + '/status', { status }); toast('操作成功', 'success'); loadAdminBooks(); } catch (e) { toast(e.message, 'error'); }
    }

    async function loadAdminCategories() {
      const container = document.getElementById('adminCategories');
      try {
        const res = await api('GET', '/admin/categories');
        const cats = res.data || [];
        if (!cats.length) { container.innerHTML = '<div class="empty"><p>暂无分类</p></div>'; return; }
        container.innerHTML = `<div class="table-wrap"><table>
      <thead><tr><th>ID</th><th>名称</th><th>父分类ID</th><th>排序</th><th>操作</th></tr></thead>
      <tbody>${cats.map(c => `<tr>
        <td>${c.id}</td>
        <td>${c.name}</td>
        <td>${c.parent_id || '-'}</td>
        <td>${c.sort_order || 0}</td>
        <td><button class="btn btn-danger btn-sm" onclick="adminDeleteCategory(${c.id})">删除</button></td>
      </tr>`).join('')}</tbody>
    </table></div>`;
      } catch (e) { container.innerHTML = '<div class="empty"><p>加载失败</p></div>'; }
    }

    function openCategoryModal() {
      openModal(`
    <h3>添加分类</h3>
    <div class="form-group"><label>名称 <span style="color:var(--danger)">*</span></label><input class="form-control" id="catName" /></div>
    <div class="form-group"><label>父分类ID</label><input class="form-control" type="number" id="catParent" value="0" /></div>
    <div class="form-group"><label>排序</label><input class="form-control" type="number" id="catSort" value="0" /></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="adminCreateCategory()">添加</button>
    </div>
  `);
    }

    async function adminCreateCategory() {
      const name = document.getElementById('catName').value.trim();
      if (!name) { toast('请输入名称', 'error'); return; }
      try {
        await api('POST', '/admin/categories', {
          name, parent_id: parseInt(document.getElementById('catParent').value) || 0,
          sort_order: parseInt(document.getElementById('catSort').value) || 0
        });
        closeModal();
        toast('添加成功', 'success');
        loadAdminCategories();
      } catch (e) { toast(e.message, 'error'); }
    }

    async function adminDeleteCategory(id) {
      if (!confirm('确定删除此分类？')) return;
      try { await api('DELETE', '/admin/categories/' + id); toast('已删除', 'success'); loadAdminCategories(); } catch (e) { toast(e.message, 'error'); }
    }

    // =====================================================
    // Modal
    // =====================================================
    function openModal(html) {
      document.getElementById('modalContent').innerHTML = html;
      document.getElementById('modalOverlay').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
    }

    // Close modal on overlay click
    document.getElementById('modalOverlay').addEventListener('click', function (e) {
      if (e.target === this) closeModal();
    });

    // =====================================================
    // Init
    // =====================================================
    (async function init() {
      // Check if already logged in
      if (getToken()) {
        try {
          const res = await api('GET', '/user/profile');
          currentUser = res.data;
          updateNavbar();
          showPage('home');
          return;
        } catch (e) {
          clearToken();
        }
      }
      updateNavbar();
      showPage('home');
    })();
  </script>
</body>

</html>
